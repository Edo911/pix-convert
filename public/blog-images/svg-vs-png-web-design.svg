<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0c17"/><stop offset="50%" stop-color="#131628"/><stop offset="100%" stop-color="#0d0f1f"/></linearGradient>
    <linearGradient id="svgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="50%" stop-color="#ffd93d"/><stop offset="100%" stop-color="#6bcb77"/></linearGradient>
    <linearGradient id="pngGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="50%" stop-color="#ffd93d"/><stop offset="100%" stop-color="#6bcb77"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="250" fill="rgba(255,107,107,0.04)"/>
  <circle cx="900" cy="200" r="250" fill="rgba(77,150,255,0.04)"/>

  <g transform="translate(100,100)">
    <rect x="0" y="0" width="440" height="300" rx="16" fill="#1a1d2e" stroke="rgba(255,217,61,0.08)" stroke-width="1.5"/>
    <text x="220" y="35" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="url(#svgGrad)" text-anchor="middle">VECTOR (SVG)</text>

    <path d="M 60,180 Q 120,60 220,140 T 380,160" fill="none" stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 80,220 Q 160,120 260,170 T 360,200" fill="none" stroke="rgba(255,217,61,0.3)" stroke-width="2" stroke-linecap="round"/>

    <circle cx="90" cy="90" r="30" fill="none" stroke="rgba(255,107,107,0.5)" stroke-width="2.5"/>
    <circle cx="200" cy="70" r="20" fill="none" stroke="rgba(255,217,61,0.5)" stroke-width="2.5"/>
    <rect x="310" y="75" width="40" height="40" rx="8" fill="none" stroke="rgba(107,203,119,0.5)" stroke-width="2.5" transform="rotate(15, 330, 95)"/>

    <circle cx="90" cy="90" r="30" fill="rgba(255,107,107,0.06)"/>
    <circle cx="200" cy="70" r="20" fill="rgba(255,217,61,0.06)"/>
    <rect x="310" y="75" width="40" height="40" rx="8" fill="rgba(107,203,119,0.06)" transform="rotate(15, 330, 95)"/>

    <polygon points="140,250 160,230 180,250" fill="rgba(255,217,61,0.2)"/>
    <polygon points="240,240 260,220 280,240" fill="rgba(255,217,61,0.15)"/>
    <polygon points="340,245 360,225 380,245" fill="rgba(255,217,61,0.1)"/>

    <text x="220" y="285" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">Infinite resolution • Small files</text>
  </g>

  <g transform="translate(660,100)">
    <rect x="0" y="0" width="440" height="300" rx="16" fill="#1a1d2e" stroke="rgba(77,150,255,0.08)" stroke-width="1.5"/>
    <text x="220" y="35" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="url(#pngGrad)" text-anchor="middle">RASTER (PNG)</text>

    <g opacity="0.5">
      <rect x="80" y="80" width="16" height="16" fill="rgba(77,150,255,0.15)"/>
      <rect x="96" y="80" width="16" height="16" fill="rgba(77,150,255,0.1)"/>
      <rect x="112" y="80" width="16" height="16" fill="rgba(77,150,255,0.05)"/>
      <rect x="80" y="96" width="16" height="16" fill="rgba(77,150,255,0.2)"/>
      <rect x="96" y="96" width="16" height="16" fill="rgba(77,150,255,0.15)"/>
      <rect x="112" y="96" width="16" height="16" fill="rgba(77,150,255,0.1)"/>
      <rect x="80" y="112" width="16" height="16" fill="rgba(77,150,255,0.1)"/>
      <rect x="96" y="112" width="16" height="16" fill="rgba(77,150,255,0.2)"/>
      <rect x="112" y="112" width="16" height="16" fill="rgba(77,150,255,0.15)"/>

      <rect x="160" y="80" width="16" height="16" fill="rgba(155,89,182,0.15)"/>
      <rect x="176" y="80" width="16" height="16" fill="rgba(155,89,182,0.1)"/>
      <rect x="160" y="96" width="16" height="16" fill="rgba(155,89,182,0.2)"/>
      <rect x="176" y="96" width="16" height="16" fill="rgba(155,89,182,0.15)"/>
      <rect x="160" y="112" width="16" height="16" fill="rgba(155,89,182,0.1)"/>
      <rect x="176" y="112" width="16" height="16" fill="rgba(155,89,182,0.15)"/>
    </g>

    <g opacity="0.4">
      <rect x="250" y="100" width="12" height="12" fill="rgba(77,150,255,0.2)"/>
      <rect x="262" y="100" width="12" height="12" fill="rgba(77,150,255,0.15)"/>
      <rect x="274" y="100" width="12" height="12" fill="rgba(77,150,255,0.1)"/>
      <rect x="250" y="112" width="12" height="12" fill="rgba(77,150,255,0.15)"/>
      <rect x="262" y="112" width="12" height="12" fill="rgba(77,150,255,0.2)"/>
      <rect x="274" y="112" width="12" height="12" fill="rgba(77,150,255,0.15)"/>
      <rect x="250" y="124" width="12" height="12" fill="rgba(77,150,255,0.1)"/>
      <rect x="262" y="124" width="12" height="12" fill="rgba(77,150,255,0.15)"/>
      <rect x="274" y="124" width="12" height="12" fill="rgba(77,150,255,0.2)"/>

      <rect x="330" y="120" width="8" height="8" fill="rgba(155,89,182,0.2)"/>
      <rect x="338" y="120" width="8" height="8" fill="rgba(155,89,182,0.15)"/>
      <rect x="330" y="128" width="8" height="8" fill="rgba(155,89,182,0.15)"/>
      <rect x="338" y="128" width="8" height="8" fill="rgba(155,89,182,0.2)"/>
    </g>

    <text x="220" y="285" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">Fixed resolution • Larger files</text>
  </g>

  <g transform="translate(200,440)">
    <rect x="0" y="0" width="800" height="60" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="100" y="36" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">SVG: logos, icons, illustrations</text>
    <line x1="200" y1="15" x2="200" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="300" y="36" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">✓ Infinitely scalable</text>
    <line x1="380" y1="15" x2="380" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="500" y="36" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">PNG: photos, textures, UI elements</text>
    <line x1="600" y1="15" x2="600" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="700" y="36" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">✓ Photorealistic</text>
  </g>

  <text x="600" y="555" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">SVG vs PNG: Which is Better for Web Design?</text>
  <text x="600" y="595" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Vector vs Raster • Resolution • Use cases</text>
</svg>