<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0c17"/><stop offset="50%" stop-color="#131628"/><stop offset="100%" stop-color="#0d0f1f"/></linearGradient>
    <linearGradient id="tiffGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#4d96ff"/></linearGradient>
    <linearGradient id="pngGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#6bcb77"/></linearGradient>
    <linearGradient id="jpegGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ffd93d"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="200" fill="rgba(155,89,182,0.04)"/>
  <circle cx="600" cy="400" r="220" fill="rgba(77,150,255,0.04)"/>
  <circle cx="1000" cy="150" r="200" fill="rgba(255,107,107,0.04)"/>

  <g transform="translate(350,50)">
    <rect x="0" y="0" width="500" height="80" rx="12" fill="#1a1d2e" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <rect x="30" y="20" width="60" height="40" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="100" y="20" width="300" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="100" y="34" width="250" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="100" y="48" width="280" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
    <circle cx="440" cy="40" r="12" fill="rgba(107,203,119,0.15)"/>
    <text x="440" y="44" font-family="Arial,sans-serif" font-size="10" fill="#6bcb77" text-anchor="middle">▶</text>
  </g>

  <g transform="translate(110,160)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="rgba(255,255,255,0.02)"/>
    <text x="150" y="25" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Document</text>
    <rect x="40" y="35" width="220" height="15" rx="4" fill="rgba(255,255,255,0.04)"/>
  </g>

  <g transform="translate(110,240)">
    <rect x="0" y="0" width="300" height="240" rx="16" fill="#1a1d2e" stroke="url(#tiffGrad)" stroke-width="2" opacity="0.8"/>
    <text x="150" y="50" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">ARCHIVAL</text>
    <text x="150" y="100" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="url(#tiffGrad)" text-anchor="middle">TIFF</text>
    <text x="150" y="135" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Lossless</text>
    <text x="150" y="160" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Huge file size</text>
    <text x="150" y="185" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Best for print</text>
    <text x="150" y="215" font-family="Arial,sans-serif" font-size="13" fill="#9b59b6" text-anchor="middle">★ Archival standard</text>
  </g>

  <g transform="translate(450,240)">
    <rect x="0" y="0" width="300" height="240" rx="16" fill="#1a1d2e" stroke="url(#pngGrad)" stroke-width="2" opacity="0.8"/>
    <text x="150" y="50" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">BALANCED</text>
    <text x="150" y="100" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="url(#pngGrad)" text-anchor="middle">PNG</text>
    <text x="150" y="135" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Lossless</text>
    <text x="150" y="160" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Large file size</text>
    <text x="150" y="185" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Good for web</text>
    <text x="150" y="215" font-family="Arial,sans-serif" font-size="13" fill="#4d96ff" text-anchor="middle">★ Web & sharing</text>
  </g>

  <g transform="translate(790,240)">
    <rect x="0" y="0" width="300" height="240" rx="16" fill="#1a1d2e" stroke="url(#jpegGrad)" stroke-width="2" opacity="0.8"/>
    <text x="150" y="50" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">COMPACT</text>
    <text x="150" y="100" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="url(#jpegGrad)" text-anchor="middle">JPEG</text>
    <text x="150" y="135" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Lossy</text>
    <text x="150" y="160" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Small file size</text>
    <text x="150" y="185" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Good for email</text>
    <text x="150" y="215" font-family="Arial,sans-serif" font-size="13" fill="#ff6b6b" text-anchor="middle">★ Everyday use</text>
  </g>

  <text x="600" y="545" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">TIFF vs PNG vs JPEG for Scanning</text>
  <text x="600" y="585" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Scanning • Print • Archival quality</text>
</svg>