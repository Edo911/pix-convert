<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0c17"/><stop offset="50%" stop-color="#131628"/><stop offset="100%" stop-color="#0d0f1f"/></linearGradient>
    <linearGradient id="webpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6bcb77"/><stop offset="100%" stop-color="#4d96ff"/></linearGradient>
    <linearGradient id="pngGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
    <linearGradient id="jpgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ffd93d"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="200" fill="rgba(107,203,119,0.04)"/>
  <circle cx="600" cy="315" r="250" fill="rgba(77,150,255,0.04)"/>
  <circle cx="1000" cy="400" r="200" fill="rgba(255,107,107,0.04)"/>

  <g transform="translate(110,150)">
    <rect x="0" y="0" width="240" height="200" rx="20" fill="url(#webpGrad)" opacity="0.15" stroke="url(#webpGrad)" stroke-width="2"/>
    <text x="120" y="65" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">BEST</text>
    <text x="120" y="120" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#6bcb77" text-anchor="middle">WebP</text>
    <text x="120" y="155" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">26% smaller than PNG</text>
    <text x="120" y="178" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Lossless + Lossy</text>
  </g>

  <g transform="translate(480,150)">
    <rect x="0" y="0" width="240" height="200" rx="20" fill="url(#pngGrad)" opacity="0.12" stroke="url(#pngGrad)" stroke-width="1.5"/>
    <text x="120" y="65" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">GOOD</text>
    <text x="120" y="120" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#4d96ff" text-anchor="middle">PNG</text>
    <text x="120" y="155" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Transparency</text>
    <text x="120" y="178" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Lossless only</text>
  </g>

  <g transform="translate(850,150)">
    <rect x="0" y="0" width="240" height="200" rx="20" fill="url(#jpgGrad)" opacity="0.12" stroke="url(#jpgGrad)" stroke-width="1.5"/>
    <text x="120" y="65" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">FAIR</text>
    <text x="120" y="120" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#ff6b6b" text-anchor="middle">JPG</text>
    <text x="120" y="155" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Smallest size</text>
    <text x="120" y="178" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">No transparency</text>
  </g>

  <text x="370" y="270" font-family="Arial,sans-serif" font-size="28" fill="rgba(107,203,119,0.4)" text-anchor="middle">→</text>
  <text x="740" y="270" font-family="Arial,sans-serif" font-size="28" fill="rgba(77,150,255,0.4)" text-anchor="middle">→</text>

  <rect x="230" y="400" width="60" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="260" y="438" font-family="Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.3)" text-anchor="middle">⚡</text>
  <text x="260" y="480" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Speed</text>

  <rect x="360" y="400" width="60" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="390" y="438" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)" text-anchor="middle">📦</text>
  <text x="390" y="480" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Size</text>

  <rect x="490" y="400" width="60" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="520" y="438" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)" text-anchor="middle">🎨</text>
  <text x="520" y="480" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Quality</text>

  <rect x="620" y="400" width="60" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="438" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)" text-anchor="middle">🌐</text>
  <text x="650" y="480" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Support</text>

  <rect x="750" y="400" width="60" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="780" y="438" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)" text-anchor="middle">🔄</text>
  <text x="780" y="480" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Convert</text>

  <text x="600" y="545" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">WebP vs PNG vs JPG: Which Format Wins?</text>
  <text x="600" y="585" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">File size • Quality • Browser support</text>
</svg>