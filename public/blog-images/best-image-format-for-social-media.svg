<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0c17"/><stop offset="50%" stop-color="#131628"/><stop offset="100%" stop-color="#0d0f1f"/></linearGradient>
    <linearGradient id="instaGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="50%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#ffd93d"/></linearGradient>
    <linearGradient id="fbGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#6bcb77"/></linearGradient>
    <linearGradient id="twGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
    <linearGradient id="liGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#ff6b6b"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="180" fill="rgba(255,107,107,0.04)"/>
  <circle cx="1000" cy="480" r="200" fill="rgba(77,150,255,0.04)"/>
  <circle cx="600" cy="315" r="250" fill="rgba(155,89,182,0.03)"/>

  <g transform="translate(120,80)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#instaGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="22" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <circle cx="40" cy="40" r="8" fill="rgba(255,255,255,0.6)"/>
    <circle cx="60" cy="20" r="4" fill="rgba(255,255,255,0.6)"/>
  </g>
  <text x="160" y="190" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">Instagram</text>

  <g transform="translate(220,80)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#fbGrad)" opacity="0.2"/>
    <rect x="20" y="20" width="40" height="40" rx="6" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <line x1="20" y1="35" x2="60" y2="35" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <line x1="20" y1="45" x2="50" y2="45" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  </g>
  <text x="260" y="190" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">Facebook</text>

  <g transform="translate(320,80)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#twGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="20" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <text x="40" y="47" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">X</text>
  </g>
  <text x="360" y="190" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">X / Twitter</text>

  <g transform="translate(140,210)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#liGrad)" opacity="0.2"/>
    <rect x="28" y="22" width="24" height="36" rx="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <line x1="28" y1="32" x2="52" y2="32" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="28" y1="40" x2="52" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="40" y="16" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">in</text>
  </g>
  <text x="180" y="320" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">LinkedIn</text>

  <g transform="translate(240,210)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="rgba(255,217,61,0.1)"/>
    <rect x="20" y="15" width="40" height="30" rx="4" fill="none" stroke="rgba(255,217,61,0.6)" stroke-width="2.5"/>
    <polygon points="20,45 60,45 55,55 25,55" fill="none" stroke="rgba(255,217,61,0.6)" stroke-width="2"/>
    <text x="40" y="70" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,217,61,0.5)" text-anchor="middle">YouTube</text>
  </g>

  <g transform="translate(340,210)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="rgba(107,203,119,0.1)"/>
    <rect x="22" y="20" width="36" height="36" rx="4" fill="none" stroke="rgba(107,203,119,0.6)" stroke-width="2.5"/>
    <circle cx="40" cy="38" r="8" fill="none" stroke="rgba(107,203,119,0.6)" stroke-width="2"/>
    <text x="40" y="70" font-family="Arial,sans-serif" font-size="9" fill="rgba(107,203,119,0.5)" text-anchor="middle">Pinterest</text>
  </g>

  <rect x="500" y="100" width="600" height="380" rx="20" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="560" y="150" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e8eaf0" text-anchor="start">Recommended Formats</text>

  <rect x="530" y="170" width="100" height="36" rx="18" fill="rgba(107,203,119,0.15)"/>
  <text x="580" y="194" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#6bcb77" text-anchor="middle">JPEG</text>

  <rect x="645" y="170" width="100" height="36" rx="18" fill="rgba(77,150,255,0.15)"/>
  <text x="695" y="194" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#4d96ff" text-anchor="middle">PNG</text>

  <rect x="758" y="170" width="100" height="36" rx="18" fill="rgba(155,89,182,0.15)"/>
  <text x="808" y="194" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#9b59b6" text-anchor="middle">WebP</text>

  <rect x="530" y="220" width="120" height="36" rx="18" fill="rgba(255,217,61,0.12)"/>
  <text x="590" y="244" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#ffd93d" text-anchor="middle">GIF</text>

  <rect x="665" y="220" width="120" height="36" rx="18" fill="rgba(255,107,107,0.12)"/>
  <text x="725" y="244" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#ff6b6b" text-anchor="middle">AVIF</text>

  <text x="530" y="290" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">📱 Instagram: JPEG / WebP (1080×1080)</text>
  <text x="530" y="320" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">📘 Facebook: JPEG / PNG (1200×630)</text>
  <text x="530" y="350" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">🐦 Twitter/X: PNG / JPEG (1200×675)</text>
  <text x="530" y="380" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">💼 LinkedIn: JPEG / PNG (1200×627)</text>
  <text x="530" y="410" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">▶️ YouTube: JPEG / WebP (1280×720)</text>
  <text x="530" y="440" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="start">📌 Pinterest: JPEG / WebP (1000×1500)</text>

  <text x="600" y="555" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">Best Image Format for Social Media</text>
  <text x="600" y="595" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Instagram • Facebook • Twitter • LinkedIn</text>
</svg>