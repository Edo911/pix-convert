<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0c17"/><stop offset="50%" stop-color="#131628"/><stop offset="100%" stop-color="#0d0f1f"/></linearGradient>
    <linearGradient id="pngGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6bcb77"/><stop offset="100%" stop-color="#4d96ff"/></linearGradient>
    <linearGradient id="jpgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ffd93d"/></linearGradient>
    <linearGradient id="rainbowText" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="25%" stop-color="#ffd93d"/><stop offset="50%" stop-color="#6bcb77"/><stop offset="75%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="250" fill="rgba(107,203,119,0.04)"/>
  <circle cx="1000" cy="400" r="280" fill="rgba(255,107,107,0.04)"/>
  <circle cx="600" cy="100" r="200" fill="rgba(77,150,255,0.04)"/>
  <circle cx="600" cy="500" r="180" fill="rgba(155,89,182,0.04)"/>

  <g transform="translate(170,180)">
    <rect x="0" y="0" width="220" height="160" rx="16" fill="url(#pngGrad)" opacity="0.9"/>
    <text x="110" y="60" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">LOSSLESS</text>
    <text x="110" y="100" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle">PNG</text>
    <text x="110" y="135" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Transparency • Sharp</text>
  </g>

  <g transform="translate(810,180)">
    <rect x="0" y="0" width="220" height="160" rx="16" fill="url(#jpgGrad)" opacity="0.9"/>
    <text x="110" y="60" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">LOSSY</text>
    <text x="110" y="100" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle">JPG</text>
    <text x="110" y="135" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Smaller • Photographic</text>
  </g>

  <g transform="translate(540,170)">
    <rect x="-40" y="0" width="80" height="180" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <rect x="-25" y="15" width="50" height="35" rx="4" fill="rgba(77,150,255,0.3)" stroke="rgba(77,150,255,0.6)" stroke-width="1.5"/>
    <line x1="-20" y1="22" x2="20" y2="22" stroke="#4d96ff" stroke-width="2"/>
    <line x1="-15" y1="30" x2="15" y2="30" stroke="#4d96ff" stroke-width="2"/>
    <line x1="-10" y1="38" x2="10" y2="38" stroke="#4d96ff" stroke-width="2"/>
    <circle cx="0" cy="80" r="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <circle cx="0" cy="80" r="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="-20" y="105" width="40" height="25" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <line x1="-15" y1="130" x2="15" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="-12" y1="138" x2="12" y2="138" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="-8" y1="146" x2="8" y2="146" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <line x1="-15" y1="155" x2="15" y2="155" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <text x="170" y="400" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✓ Transparency</text>
  <text x="170" y="430" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✓ Lossless</text>
  <text x="170" y="460" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✗ Large files</text>

  <text x="1030" y="400" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✓ Small files</text>
  <text x="1030" y="430" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✓ Photos</text>
  <text x="1030" y="460" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">✗ No transparency</text>

  <text x="600" y="530" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">PNG vs JPG: Which is Best for Web?</text>
  <text x="600" y="575" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Web performance • Quality • Transparency</text>
</svg>