    <linearGradient id="gifGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ffd93d"/></linearGradient>
    <linearGradient id="pngAnimGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6bcb77"/><stop offset="100%" stop-color="#4d96ff"/></linearGradient>
    <linearGradient id="webpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
    <linearGradient id="rainbowText" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="25%" stop-color="#ffd93d"/><stop offset="50%" stop-color="#6bcb77"/><stop offset="75%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#9b59b6"/></linearGradient>
