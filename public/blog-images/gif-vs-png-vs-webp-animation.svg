  <text x="600" y="558" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#e8eaf0" text-anchor="middle">GIF vs PNG vs WebP for Animation</text>
  <text x="600" y="598" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Animation • Quality • File size • Browser support</text>
