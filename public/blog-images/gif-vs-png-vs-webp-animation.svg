    <text x="400" y="33" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#6bcb77" text-anchor="middle">PNG</text>
    <text x="400" y="33" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" text-anchor="middle" dx="40">Transparency</text>
    <line x1="533" y1="10" x2="533" y2="40" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="666" y="33" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#4d96ff" text-anchor="middle">WebP</text>
    <text x="666" y="33" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" text-anchor="middle" dx="50">Best quality</text>
